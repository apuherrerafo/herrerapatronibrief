<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin · H&P Design Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/main.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Variables y tema: main.css (tweakcn/shadcn) */

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 300;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── LOGIN ── */
#loginScreen {
  position: fixed; inset: 0; z-index: 1000;
  overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#loginScreen .login-screen-video {
  position: absolute; inset: 0; z-index: -1;
  width: 100%; height: 100%;
  object-fit: cover;
}
#loginScreen .login-screen-overlay {
  position: absolute; inset: 0; z-index: 0;
  background: rgba(0, 0, 0, 0.55);
  pointer-events: none;
}
#loginScreen .login-screen-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0;
}
#loginScreen .login-panel {
  background: rgba(255, 255, 255, 0.95);
  padding: 2rem 2.5rem;
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  display: flex; flex-direction: column;
  align-items: center;
  max-width: 320px;
}
#loginScreen.hidden { opacity: 0; pointer-events: none; transform: translateY(-10px); }
.login-logo { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 2.5rem; }
.login-title { font-family: var(--serif); font-size: 2.5rem; font-weight: 400; text-align: center; margin-bottom: 0.4rem; line-height: 1.1; }
.login-subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 2rem; }
.login-box { display: flex; flex-direction: column; gap: 0.65rem; width: 100%; max-width: 260px; }
.login-input {
  width: 100%; border: 1px solid var(--border); background: #fff;
  font-family: var(--sans); font-size: 14px; font-weight: 400; color: var(--text);
  padding: 0.75rem 1rem; outline: none; border-radius: var(--radius);
  transition: border-color var(--transition); text-align: center; letter-spacing: 0.1em;
}
.login-input:focus { border-color: var(--text); }
.login-input::placeholder { color: #888; letter-spacing: 0; }
.login-btn {
  background: var(--text); color: #fff; border: none;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 0.85rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: opacity var(--transition);
}
.login-btn:hover { opacity: 0.75; }
.login-error { font-size: 12px; color: var(--red); text-align: center; min-height: 18px; }

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(250,250,248,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem; height: 52px;
}
.topbar-logo { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; }
.topbar-tag {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  background: var(--text); color: #fff;
  padding: 0.25rem 0.65rem; border-radius: 100px;
}
.topbar-right { display: flex; align-items: center; gap: 1rem; }
.logout-btn {
  font-size: 11px; color: var(--muted); background: none; border: none;
  cursor: pointer; letter-spacing: 0.06em; font-family: var(--sans);
  transition: color var(--transition);
}
.logout-btn:hover { color: var(--text); }

/* ── LAYOUT ── */
.wrapper { max-width: 900px; margin: 0 auto; padding: 100px 1.5rem 80px; }

/* ── HEADER ── */
.page-header { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
.page-eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
.page-title { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); font-weight: 400; line-height: 1.05; }
.page-title em { font-style: italic; color: var(--muted); }

/* ── USER CARDS ── */
.users-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 3rem; }
.user-card {
  background: var(--surface); padding: 1.75rem;
  display: flex; flex-direction: column; gap: 1rem;
}
.user-card-header { display: flex; align-items: center; justify-content: space-between; }
.user-name { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; }
.user-status {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.2rem 0.6rem; border-radius: 100px;
}
.user-status.submitted { background: #eafaf1; color: var(--green); }
.user-status.draft { background: #fef9e7; color: #d4ac0d; }
.user-status.empty { background: var(--subtle); color: var(--muted); }
.user-meta { font-size: 12px; color: var(--muted); }
.user-actions { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
.btn-view {
  flex: 1; font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--text); color: #fff; border: none;
  padding: 0.6rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: opacity var(--transition);
}
.btn-view:hover { opacity: 0.75; }
.btn-view:disabled { opacity: 0.25; cursor: not-allowed; }
.btn-clear {
  font-family: var(--sans); font-size: 11px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: transparent; color: var(--red); border: 1px solid #f0b8b4;
  padding: 0.6rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.btn-clear:hover { background: #fdf0ef; border-color: var(--red); }
.btn-clear:disabled { opacity: 0.25; cursor: not-allowed; }

/* ── BRIEF VIEWER ── */
.brief-viewer {
  display: none;
  background: var(--surface); border: 1px solid var(--border);
  padding: 2.5rem;
}
.brief-viewer.show { display: block; }
.brief-viewer-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 1rem;
}
.brief-viewer-title { font-family: var(--serif); font-size: 1.6rem; font-weight: 400; }
.brief-viewer-actions { display: flex; gap: 0.5rem; }
.btn-copy {
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: transparent; color: var(--text); border: 1px solid var(--border);
  padding: 0.5rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.btn-copy:hover { border-color: var(--text); }
.btn-close {
  font-family: var(--sans); font-size: 11px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: transparent; color: var(--muted); border: 1px solid var(--border);
  padding: 0.5rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.btn-close:hover { color: var(--text); border-color: var(--text); }

/* ── BRIEF CONTENT ── */
.brief-content { display: flex; flex-direction: column; gap: 0; }
.brief-section { padding: 1.5rem 0; border-bottom: 1px solid var(--border); }
.brief-section:last-child { border-bottom: none; }
.brief-section-title { font-size: 10px; letter-spacing: 0.14em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
.brief-rows { display: flex; flex-direction: column; gap: 0.6rem; }
.brief-row { display: grid; grid-template-columns: 200px 1fr; gap: 1rem; align-items: baseline; }
.brief-row-label { font-size: 11px; color: var(--muted); }
.brief-row-val { font-size: 13px; color: var(--text); }
.brief-priority {
  display: inline-flex; align-items: center; justify-content: center;
  width: 26px; height: 26px;
  background: var(--text); color: #fff;
  font-size: 12px; font-weight: 500; border-radius: 50%;
}
.empty-state { padding: 2rem; text-align: center; color: var(--muted); font-size: 13px; font-style: italic; }

/* ── CONFIRM MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(250,250,248,0.85); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  padding: 2rem; max-width: 340px; width: 90%;
  display: flex; flex-direction: column; gap: 1.25rem;
}
.modal-title { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; }
.modal-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
.modal-actions { display: flex; gap: 0.5rem; }
.btn-confirm-clear {
  flex: 1; background: var(--red); color: #fff; border: none;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.7rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: opacity var(--transition);
}
.btn-confirm-clear:hover { opacity: 0.8; }
.btn-cancel {
  flex: 1; background: transparent; color: var(--text); border: 1px solid var(--border);
  font-family: var(--sans); font-size: 11px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.7rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.btn-cancel:hover { border-color: var(--text); }

@media (max-width: 600px) {
  .topbar { padding: 0 1rem; }
  .wrapper { padding: 88px 1rem 60px; }
  .brief-row { grid-template-columns: 1fr; gap: 0.2rem; }
  .brief-viewer { padding: 1.5rem; }
}
</style>
</head>
<body>

<!-- LOGIN: solo contraseña "cafeteria" -->
<div id="loginScreen">
  <video class="login-screen-video" autoplay loop muted playsinline aria-hidden="true">
    <source src="/assets/videos/Flow_delpmaspu_.mp4" type="video/mp4"/>
  </video>
  <div class="login-screen-overlay" aria-hidden="true"></div>
  <div class="login-screen-content">
    <div class="login-panel">
      <p class="login-logo">Herrera &amp; Patroni · Admin</p>
      <h1 class="login-title">Back<em style="font-style:italic;color:#8a8a8a">office</em></h1>
      <p class="login-subtitle">Código de acceso administrativo</p>
      <div class="login-box">
        <input class="login-input" id="loginInput" type="password" placeholder="Código" autocomplete="off"/>
        <button class="login-btn" onclick="handleLogin()">Ingresar</button>
        <p class="login-error" id="loginError"></p>
      </div>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar" id="topbar" style="display:none">
  <div style="display:flex;align-items:center;gap:1rem">
    <span class="topbar-logo">Herrera &amp; Patroni</span>
    <span class="topbar-tag">Admin</span>
  </div>
  <div class="topbar-right">
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
</div>

<!-- MAIN -->
<div class="wrapper" id="mainApp" style="display:none">

  <div class="page-header">
    <p class="page-eyebrow">Panel Administrativo</p>
    <h1 class="page-title">Briefs <em>recibidos</em></h1>
  </div>

  <div class="users-grid" id="usersGrid"></div>

  <div class="brief-viewer" id="briefViewer">
    <div class="brief-viewer-header">
      <h2 class="brief-viewer-title" id="viewerTitle">Brief</h2>
      <div class="brief-viewer-actions">
        <button class="btn-copy" onclick="copyBrief()">Copiar texto</button>
        <button class="btn-close" onclick="closeViewer()">Cerrar</button>
      </div>
    </div>
    <div class="brief-content" id="briefContent"></div>
  </div>

</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modalOverlay" data-clear-user="">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 class="modal-title">Limpiar brief</h3>
    <p class="modal-desc" id="modalDesc">¿Confirmas que quieres borrar el brief de este usuario? Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button type="button" class="btn-confirm-clear" id="btnConfirmClear">Sí, limpiar</button>
      <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const ADMIN_CODE = 'cafeteria';
const USERS = ['cervera', 'herrera', 'patroni'];
const USER_LABELS = { cervera: 'Cervera', herrera: 'Herrera', patroni: 'Patroni' };

let pendingClearUser = null;

function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── LOGIN: solo "cafeteria" (case-insensitive) ──
function handleLogin() {
  const val = document.getElementById('loginInput').value.trim().toLowerCase();
  if (val === ADMIN_CODE) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('topbar').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'block';
    renderUserCards();
  } else {
    document.getElementById('loginError').textContent = 'Código incorrecto.';
    document.getElementById('loginInput').value = '';
  }
}
document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

function logout() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginInput').value = '';
  document.getElementById('loginError').textContent = '';
  closeViewer();
}

// ── GET USER DATA ──
function getUserData(user) {
  const report = localStorage.getItem(`hp_brief_${user}_report`);
  const progress = localStorage.getItem(`hp_brief_${user}`);
  let latestFinal = null;
  let latestTime = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(`hp_brief_${user}_FINAL_`)) {
      const ts = parseInt(key.split('_FINAL_')[1]) || 0;
      if (ts > latestTime) { latestTime = ts; latestFinal = key; }
    }
  }
  return {
    hasSubmission: !!latestFinal,
    hasDraft: !!progress && !latestFinal,
    isEmpty: !progress && !latestFinal,
    report: report || null,
    progress: progress ? JSON.parse(progress) : null,
    submittedAt: latestTime || null,
  };
}

// ── RENDER CARDS ──
function renderUserCards() {
  const grid = document.getElementById('usersGrid');
  grid.innerHTML = '';
  USERS.forEach(user => {
    const data = getUserData(user);
    const label = USER_LABELS[user];
    let statusClass = 'empty', statusText = 'Sin datos';
    if (data.hasSubmission) { statusClass = 'submitted'; statusText = 'Enviado'; }
    else if (data.hasDraft) { statusClass = 'draft'; statusText = 'Borrador'; }
    let metaText = 'Sin actividad registrada';
    if (data.submittedAt) {
      metaText = 'Enviado el ' + new Date(data.submittedAt).toLocaleDateString('es-PE', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } else if (data.hasDraft) {
      metaText = 'Progreso guardado — no enviado aún';
    }
    const card = document.createElement('div');
    card.className = 'user-card';
    card.innerHTML = `
      <div class="user-card-header">
        <span class="user-name">${escapeHtml(label)}</span>
        <span class="user-status ${statusClass}">${escapeHtml(statusText)}</span>
      </div>
      <p class="user-meta">${escapeHtml(metaText)}</p>
      <div class="user-actions">
        <button class="btn-view" ${data.isEmpty ? 'disabled' : ''} onclick="viewBrief('${user}')">Ver brief</button>
        <button class="btn-clear" ${data.isEmpty ? 'disabled' : ''} onclick="confirmClear('${user}')">Limpiar</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── VIEW BRIEF ──
function viewBrief(user) {
  const data = getUserData(user);
  const label = USER_LABELS[user];
  document.getElementById('viewerTitle').textContent = 'Brief · ' + label;
  document.getElementById('briefViewer').classList.add('show');
  const content = document.getElementById('briefContent');
  if (data.report) {
    content.innerHTML = renderReportHTML(data.report);
  } else if (data.progress) {
    content.innerHTML = renderStateHTML(data.progress);
  } else {
    content.innerHTML = '<p class="empty-state">No hay datos disponibles para este usuario.</p>';
  }
  document.getElementById('briefViewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeViewer() {
  document.getElementById('briefViewer').classList.remove('show');
  document.getElementById('briefContent').innerHTML = '';
}

// ── RENDER REPORT (texto del reporte) ──
function renderReportHTML(report) {
  const lines = report.split('\n').filter(l => l.trim());
  const rows = [];
  let currentLabel = '';
  lines.forEach(line => {
    if (line.endsWith(':')) {
      currentLabel = line.slice(0, -1);
    } else if (currentLabel && line !== '—') {
      rows.push({ label: currentLabel, val: line });
      currentLabel = '';
    } else {
      currentLabel = '';
    }
  });
  if (!rows.length) {
    return '<div class="brief-section"><pre style="font-size:12px;color:#8a8a8a;white-space:pre-wrap;line-height:1.7">' + escapeHtml(report) + '</pre></div>';
  }
  const grouped = {};
  rows.forEach(({ label, val }) => {
    const prefix = label.split('·')[0].trim();
    if (!grouped[prefix]) grouped[prefix] = [];
    grouped[prefix].push({ label: label.split('·').slice(1).join('·').trim() || label, val });
  });
  let html = '';
  Object.entries(grouped).forEach(([group, items]) => {
    html += '<div class="brief-section"><p class="brief-section-title">' + escapeHtml(group) + '</p><div class="brief-rows">';
    items.forEach(({ label, val }) => {
      const isScale = label.toLowerCase().includes('prioridad');
      html += '<div class="brief-row"><span class="brief-row-label">' + escapeHtml(label) + '</span><span class="brief-row-val">' + (isScale ? '<span class="brief-priority">' + escapeHtml(val) + '</span>' : escapeHtml(val)) + '</span></div>';
    });
    html += '</div></div>';
  });
  return html || '<p class="empty-state">Sin respuestas registradas.</p>';
}

// ── RENDER STATE (objeto estado / borrador) ──
function renderStateHTML(state) {
  const labelMap = {
    'pills__sala-muebles':      ['Sala – Comedor', 'Muebles a reutilizar'],
    'radio__sala-tv-group':     ['Sala – Comedor', 'TV'],
    'text__sala_tv_detalle':    ['Sala – Comedor', 'TV (detalle)'],
    'radio__sala-veg-group':    ['Sala – Comedor', 'Vegetación'],
    'text__sala_veg_detalle':   ['Sala – Comedor', 'Vegetación (detalle)'],
    'text__sala_notas':         ['Sala – Comedor', 'Notas'],
    'scale__sala_prioridad':    ['Sala – Comedor', 'Prioridad'],
    'pills__cocina-muebles':    ['Cocina', 'Muebles a reutilizar'],
    'radio__cocina-nivel-group':['Cocina', 'Tipo de intervención'],
    'pills__cocina-enchapes':   ['Cocina', 'Enchapes'],
    'text__cocina_electro':     ['Cocina', 'Electrodomésticos'],
    'text__cocina_notas':       ['Cocina', 'Notas'],
    'scale__cocina_prioridad':  ['Cocina', 'Prioridad'],
    'pills__dorm1-muebles':     ['Dorm. Principal', 'Muebles a reutilizar'],
    'radio__dorm1-nivel-group': ['Dorm. Principal', 'Intervención'],
    'radio__dorm1-tv-group':    ['Dorm. Principal', 'TV'],
    'text__dorm1_tv_detalle':   ['Dorm. Principal', 'TV (detalle)'],
    'pills__wc-el':             ['Dorm. Principal · Closet Él', 'Inventario'],
    'text__wc_el_otros':        ['Dorm. Principal · Closet Él', 'Otros'],
    'text__wc_el_notas':        ['Dorm. Principal · Closet Él', 'Notas'],
    'pills__wc-ella':           ['Dorm. Principal · Closet Ella', 'Inventario'],
    'text__wc_ella_otros':      ['Dorm. Principal · Closet Ella', 'Otros'],
    'text__wc_ella_notas':      ['Dorm. Principal · Closet Ella', 'Notas'],
    'text__dorm1_notas':        ['Dorm. Principal', 'Notas'],
    'scale__dorm1_prioridad':   ['Dorm. Principal', 'Prioridad'],
    'pills__cristobal-muebles': ['Cristóbal', 'Muebles a reutilizar'],
    'age__cristobal':           ['Cristóbal', 'Edad'],
    'radio__cristobal-evol-group':['Cristóbal', 'Mobiliario evolutivo'],
    'text__cristobal_notas':    ['Cristóbal', 'Notas'],
    'scale__cristobal_prioridad':['Cristóbal', 'Prioridad'],
    'pills__family-muebles':    ['Family Room', 'Muebles a reutilizar'],
    'pills__family-uso':        ['Family Room', 'Uso principal'],
    'text__family_uso_otros':   ['Family Room', 'Uso (otros)'],
    'radio__family-tv-group':   ['Family Room', 'TV'],
    'text__family_tv_detalle':  ['Family Room', 'TV (detalle)'],
    'text__family_notas':       ['Family Room', 'Notas'],
    'scale__family_prioridad':  ['Family Room', 'Prioridad'],
    'radio__bano1-nivel-group': ['Baño Principal', 'Intervención'],
    'pills__bano1-equip':       ['Baño Principal', 'Equipamiento'],
    'text__bano1_equip_otros':  ['Baño Principal', 'Otros'],
    'text__bano1_notas':        ['Baño Principal', 'Notas'],
    'radio__bano2-nivel-group': ['Baño Secundario', 'Intervención'],
    'pills__bano2-equip':       ['Baño Secundario', 'Equipamiento'],
    'text__bano2_equip_otros':  ['Baño Secundario', 'Otros'],
    'text__bano2_notas':        ['Baño Secundario', 'Notas'],
    'radio__bano3-nivel-group': ['Baño de Visita', 'Intervención'],
    'pills__bano3-equip':       ['Baño de Visita', 'Equipamiento'],
    'text__bano3_equip_otros':  ['Baño de Visita', 'Otros'],
    'text__bano3_notas':        ['Baño de Visita', 'Notas'],
    'pills__musthaves-list':    ['Must-Haves', 'Selección'],
    'text__musthaves_otros':    ['Must-Haves', 'Otros'],
    'text__notas_finales':      ['General', 'Notas finales'],
  };
  const grouped = {};
  Object.entries(labelMap).forEach(([key, [group, label]]) => {
    const val = state[key];
    if (!val) return;
    if (!grouped[group]) grouped[group] = [];
    const display = Array.isArray(val) ? val.join(', ') : val;
    grouped[group].push({ label, val: display });
  });
  if (!Object.keys(grouped).length) return '<p class="empty-state">Borrador vacío — el usuario no ha ingresado datos aún.</p>';
  let html = '';
  Object.entries(grouped).forEach(([group, items]) => {
    html += '<div class="brief-section"><p class="brief-section-title">' + escapeHtml(group) + '</p><div class="brief-rows">';
    items.forEach(({ label, val }) => {
      const isScale = label.toLowerCase().includes('prioridad');
      html += '<div class="brief-row"><span class="brief-row-label">' + escapeHtml(label) + '</span><span class="brief-row-val">' + (isScale ? '<span class="brief-priority">' + escapeHtml(val) + '</span>' : escapeHtml(val)) + '</span></div>';
    });
    html += '</div></div>';
  });
  return html;
}

// ── COPY ──
function copyBrief() {
  const text = document.getElementById('briefContent').innerText;
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    btn.textContent = 'Copiado ✓';
    setTimeout(() => btn.textContent = 'Copiar texto', 2000);
  });
}

// ── CLEAR ──
function confirmClear(user) {
  const overlay = document.getElementById('modalOverlay');
  overlay.dataset.clearUser = user;
  pendingClearUser = user;
  document.getElementById('modalDesc').textContent =
    '¿Confirmas que quieres borrar todos los datos del brief de ' + USER_LABELS[user] + '? Esta acción no se puede deshacer.';
  overlay.classList.add('show');
  document.getElementById('btnConfirmClear').onclick = function() { executeClear(); };
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('modalOverlay').removeAttribute('data-clear-user');
  pendingClearUser = null;
}

function executeClear() {
  const overlay = document.getElementById('modalOverlay');
  const user = overlay.dataset.clearUser || pendingClearUser;
  if (!user) return;
  // Borrar todas las claves de este usuario
  localStorage.removeItem('hp_brief_' + user);
  localStorage.removeItem('hp_brief_' + user + '_report');
  const keysToRemove = [];
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const key = localStorage.key(i);
    if (key && (key === 'hp_brief_' + user || key === 'hp_brief_' + user + '_report' || key.indexOf('hp_brief_' + user + '_FINAL_') === 0)) {
      keysToRemove.push(key);
    }
  }
  keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
  closeModal();
  closeViewer();
  renderUserCards();
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
</script>

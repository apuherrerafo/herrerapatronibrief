<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Admin · H&P Design Studio</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="/assets/main.css"/>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

/* Variables y tema: main.css (tweakcn/shadcn) */

html { scroll-behavior: smooth; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 300;
  line-height: 1.55;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── LOGIN ── */
#loginScreen {
  position: fixed; inset: 0; z-index: 1000;
  overflow: hidden;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0;
  transition: opacity 0.4s ease, transform 0.4s ease;
}
#loginScreen .login-screen-video {
  position: absolute; inset: 0; z-index: -1;
  width: 100%; height: 100%;
  object-fit: cover;
}
#loginScreen .login-screen-overlay {
  position: absolute; inset: 0; z-index: 0;
  background: rgba(0, 0, 0, 0.55);
  pointer-events: none;
}
#loginScreen .login-screen-content {
  position: relative; z-index: 1;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 0;
}
#loginScreen .login-panel {
  background: rgba(255, 255, 255, 0.95);
  padding: 2rem 2.5rem;
  border-radius: 8px;
  box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
  display: flex; flex-direction: column;
  align-items: center;
  max-width: 320px;
}
#loginScreen.hidden { opacity: 0; pointer-events: none; transform: translateY(-10px); }
.login-logo { font-size: 10px; font-weight: 500; letter-spacing: 0.18em; text-transform: uppercase; color: var(--muted); margin-bottom: 2.5rem; }
.login-title { font-family: var(--serif); font-size: 2.5rem; font-weight: 400; text-align: center; margin-bottom: 0.4rem; line-height: 1.1; }
.login-subtitle { font-size: 13px; color: var(--muted); text-align: center; margin-bottom: 2rem; }
.login-box { display: flex; flex-direction: column; gap: 0.65rem; width: 100%; max-width: 260px; }
.login-input {
  width: 100%; border: 1px solid var(--border); background: #fff;
  font-family: var(--sans); font-size: 14px; font-weight: 400; color: var(--text);
  padding: 0.75rem 1rem; outline: none; border-radius: var(--radius);
  transition: border-color var(--transition); text-align: center; letter-spacing: 0.1em;
}
.login-input:focus { border-color: var(--text); }
.login-input::placeholder { color: #888; letter-spacing: 0; }
.login-btn {
  background: var(--text); color: #fff; border: none;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.14em; text-transform: uppercase;
  padding: 0.85rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: opacity var(--transition);
}
.login-btn:hover { opacity: 0.75; }
.login-error { font-size: 12px; color: var(--red); text-align: center; min-height: 18px; }

/* ── TOPBAR ── */
.topbar {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  background: rgba(250,250,248,0.9); backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 2.5rem; height: 52px;
}
.topbar-logo { font-size: 10px; font-weight: 500; letter-spacing: 0.16em; text-transform: uppercase; }
.topbar-tag {
  font-size: 10px; letter-spacing: 0.12em; text-transform: uppercase;
  background: var(--text); color: #fff;
  padding: 0.25rem 0.65rem; border-radius: 100px;
}
.topbar-right { display: flex; align-items: center; gap: 1rem; }
.logout-btn {
  font-size: 11px; color: var(--muted); background: none; border: none;
  cursor: pointer; letter-spacing: 0.06em; font-family: var(--sans);
  transition: color var(--transition);
}
.logout-btn:hover { color: var(--text); }

/* ── LAYOUT ── */
.wrapper { max-width: 900px; margin: 0 auto; padding: 100px 1.5rem 80px; }

/* ── HEADER ── */
.page-header { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
.page-eyebrow { font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--muted); margin-bottom: 1rem; }
.page-title { font-family: var(--serif); font-size: clamp(2rem, 4vw, 3rem); font-weight: 400; line-height: 1.05; }
.page-title em { font-style: italic; color: var(--muted); }

/* ── USER CARDS ── */
.users-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-bottom: 3rem; }
.user-card {
  background: var(--surface); padding: 1.75rem;
  display: flex; flex-direction: column; gap: 1rem;
}
.user-card-header { display: flex; align-items: center; justify-content: space-between; }
.user-name { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; }
.user-status {
  font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.2rem 0.6rem; border-radius: 100px;
}
.user-status.submitted { background: #eafaf1; color: var(--green); }
.user-status.draft { background: #fef9e7; color: #d4ac0d; }
.user-status.empty { background: var(--subtle); color: var(--muted); }
.user-meta { font-size: 12px; color: var(--muted); }
.user-actions { display: flex; gap: 0.5rem; margin-top: 0.25rem; }
.btn-view {
  flex: 1; font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: var(--text); color: #fff; border: none;
  padding: 0.6rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: opacity var(--transition);
}
.btn-view:hover { opacity: 0.75; }
.btn-view:disabled { opacity: 0.25; cursor: not-allowed; }
.btn-clear {
  font-family: var(--sans); font-size: 11px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: transparent; color: var(--red); border: 1px solid #f0b8b4;
  padding: 0.6rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.btn-clear:hover { background: #fdf0ef; border-color: var(--red); }
.btn-clear:disabled { opacity: 0.25; cursor: not-allowed; }

/* ── BRIEF VIEWER ── */
.brief-viewer {
  display: none;
  background: var(--surface); border: 1px solid var(--border);
  padding: 2.5rem;
}
.brief-viewer.show { display: block; }
.brief-iframe {
  width: 100%; min-height: 70vh; border: 1px solid var(--border); border-radius: var(--radius);
}
.brief-viewer-header {
  display: flex; align-items: baseline; justify-content: space-between;
  margin-bottom: 2rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border);
  flex-wrap: wrap; gap: 1rem;
}
.brief-viewer-title { font-family: var(--serif); font-size: 1.6rem; font-weight: 400; }
.brief-viewer-actions { display: flex; gap: 0.5rem; }
.btn-copy {
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  background: transparent; color: var(--text); border: 1px solid var(--border);
  padding: 0.5rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.btn-copy:hover { border-color: var(--text); }
.btn-close {
  font-family: var(--sans); font-size: 11px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
  background: transparent; color: var(--muted); border: 1px solid var(--border);
  padding: 0.5rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.btn-close:hover { color: var(--text); border-color: var(--text); }

/* ── BRIEF CONTENT ── */
.brief-content { display: flex; flex-direction: column; gap: 0; }
.empty-state { padding: 2rem; text-align: center; color: var(--muted); font-size: 13px; font-style: italic; }
.report-fallback { padding: 1.5rem; font-size: 13px; white-space: pre-wrap; line-height: 1.7; font-family: var(--sans); color: var(--text); }

/* ── PRIORITY SUMMARY ── */
.priority-summary { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1.75rem; padding-bottom: 1.75rem; border-bottom: 1px solid var(--border); }
.priority-card { flex: 1; min-width: 110px; padding: 0.65rem 0.85rem; border: 1px solid var(--border); border-radius: var(--radius); display: flex; flex-direction: column; gap: 0.4rem; }
.priority-card-name { font-size: 10px; font-weight: 500; letter-spacing: 0.04em; color: var(--text); }
.priority-bar { display: flex; gap: 3px; height: 5px; }
.priority-bar-seg { flex: 1; border-radius: 3px; background: var(--border); }
.priority-bar-seg.filled { background: var(--text); }

/* ── ROOM CARDS ── */
.room-card { border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 0.75rem; }
.room-card:last-child { margin-bottom: 0; }
.room-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.25rem; padding-bottom: 0.75rem; border-bottom: 1px solid var(--border); }
.room-card-name { font-family: var(--serif); font-size: 1.15rem; font-weight: 400; }
.priority-badge { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; border-radius: 50%; background: var(--text); color: #fff; font-size: 12px; font-weight: 500; font-family: var(--sans); flex-shrink: 0; }
.room-card-body { display: flex; flex-direction: column; gap: 1rem; }

/* ── CHIPS ── */
.field-group { display: flex; flex-direction: column; gap: 0.4rem; }
.field-label { font-size: 10px; letter-spacing: 0.08em; text-transform: uppercase; color: var(--muted); }
.chip-row { display: flex; flex-wrap: wrap; gap: 0.3rem; }
.chip { font-family: var(--sans); font-size: 12px; font-weight: 400; padding: 0.25rem 0.7rem; border-radius: 100px; background: var(--subtle); color: var(--text); border: 1px solid var(--border); }

/* ── DECISION BADGES ── */
.decision-row { display: flex; flex-wrap: wrap; gap: 0.4rem; }
.decision-badge { font-family: var(--sans); font-size: 12px; font-weight: 400; padding: 0.3rem 0.75rem; border-radius: var(--radius); background: var(--subtle); color: var(--text); border: 1px solid var(--border); }
.decision-badge-label { font-weight: 500; color: var(--muted); margin-right: 0.25rem; }

/* ── NOTE BLOCKS ── */
.note-block { background: var(--subtle); border-radius: var(--radius); padding: 0.65rem 0.85rem; font-size: 13px; color: var(--text); line-height: 1.5; border-left: 3px solid var(--border); }
.note-block .note-label { font-size: 10px; letter-spacing: 0.06em; text-transform: uppercase; color: var(--muted); margin-bottom: 0.2rem; }

/* ── SUB-SECTIONS (baños) ── */
.sub-section { padding-top: 0.75rem; border-top: 1px solid var(--border); }
.sub-section-name { font-size: 11px; font-weight: 500; letter-spacing: 0.04em; margin-bottom: 0.65rem; }

/* ── CONFIRM MODAL ── */
.modal-overlay {
  display: none; position: fixed; inset: 0; z-index: 500;
  background: rgba(250,250,248,0.85); backdrop-filter: blur(4px);
  align-items: center; justify-content: center;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--surface); border: 1px solid var(--border);
  padding: 2rem; max-width: 340px; width: 90%;
  display: flex; flex-direction: column; gap: 1.25rem;
}
.modal-title { font-family: var(--serif); font-size: 1.3rem; font-weight: 400; }
.modal-desc { font-size: 13px; color: var(--muted); line-height: 1.6; }
.modal-actions { display: flex; gap: 0.5rem; }
.btn-confirm-clear {
  flex: 1; background: var(--red); color: #fff; border: none;
  font-family: var(--sans); font-size: 11px; font-weight: 500;
  letter-spacing: 0.1em; text-transform: uppercase;
  padding: 0.7rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: opacity var(--transition);
}
.btn-confirm-clear:hover { opacity: 0.8; }
.btn-cancel {
  flex: 1; background: transparent; color: var(--text); border: 1px solid var(--border);
  font-family: var(--sans); font-size: 11px; font-weight: 400;
  letter-spacing: 0.08em; text-transform: uppercase;
  padding: 0.7rem 1rem; cursor: pointer; border-radius: var(--radius);
  transition: all var(--transition);
}
.btn-cancel:hover { border-color: var(--text); }

@media (max-width: 600px) {
  .topbar { padding: 0 1rem; }
  .wrapper { padding: 88px 1rem 60px; }
  .brief-viewer { padding: 1.5rem; }
  .priority-summary { gap: 0.35rem; }
  .priority-card { min-width: 90px; padding: 0.5rem 0.65rem; }
  .room-card { padding: 1.25rem; }
}

/* Mobile: base 420px, 100% scale */
@media (max-width: 420px) {
  html { overflow-x: hidden; }
  .topbar { padding: 0 0.75rem; height: 48px; }
  .topbar-logo { font-size: 9px; letter-spacing: 0.12em; }
  .topbar-tag { font-size: 9px; padding: 0.2rem 0.5rem; }
  .logout-btn { font-size: 10px; }
  .wrapper { max-width: 100%; padding: 72px 0.75rem 60px; }
  .page-header { margin-bottom: 2rem; padding-bottom: 1.5rem; }
  .page-eyebrow { font-size: 9px; }
  .page-title { font-size: 1.75rem; }
  .users-grid { grid-template-columns: 1fr; }
  .user-card { padding: 1.25rem; }
  .user-name { font-size: 1.15rem; }
  .user-actions { flex-direction: column; gap: 0.5rem; }
  .btn-view, .btn-clear { min-height: 44px; width: 100%; justify-content: center; }
  .brief-viewer { padding: 1rem; }
  .brief-viewer-header { flex-direction: column; align-items: flex-start; gap: 0.75rem; }
  .brief-viewer-title { font-size: 1.35rem; }
  .priority-summary { flex-direction: column; }
  .room-card { padding: 1rem; }
  .room-card-name { font-size: 1rem; }
  .chip { font-size: 11px; }
  .decision-badge { font-size: 11px; }
  #loginScreen .login-panel { max-width: 100%; padding: 1.5rem 1rem; margin: 0 0.75rem; }
  .login-title { font-size: 2rem; }
  .login-subtitle { font-size: 12px; margin-bottom: 1.5rem; }
  .login-box { max-width: 100%; }
  .login-input { min-height: 48px; font-size: 16px; }
  .login-btn { min-height: 48px; padding: 0.75rem 1rem; }
  .modal { width: calc(100% - 1.5rem); max-width: none; padding: 1.5rem; margin: 0 0.75rem; }
}
</style>
</head>
<body>

<!-- LOGIN: solo contraseña "cafeteria" -->
<div id="loginScreen">
  <video class="login-screen-video" autoplay loop muted playsinline aria-hidden="true">
    <source src="/assets/videos/Flow_delpmaspu_.mp4" type="video/mp4"/>
  </video>
  <div class="login-screen-overlay" aria-hidden="true"></div>
  <div class="login-screen-content">
    <div class="login-panel">
      <p class="login-logo">Herrera &amp; Patroni · Admin</p>
      <h1 class="login-title">Back<em style="font-style:italic;color:#8a8a8a">office</em></h1>
      <p class="login-subtitle">Código de acceso administrativo</p>
      <div class="login-box">
        <input class="login-input" id="loginInput" type="password" placeholder="Código" autocomplete="off"/>
        <button class="login-btn" onclick="handleLogin()">Ingresar</button>
        <p class="login-error" id="loginError"></p>
      </div>
    </div>
  </div>
</div>

<!-- TOPBAR -->
<div class="topbar" id="topbar" style="display:none">
  <div style="display:flex;align-items:center;gap:1rem">
    <span class="topbar-logo">Herrera &amp; Patroni</span>
    <span class="topbar-tag">Admin</span>
  </div>
  <div class="topbar-right">
    <button class="logout-btn" onclick="logout()">Salir</button>
  </div>
</div>

<!-- MAIN -->
<div class="wrapper" id="mainApp" style="display:none">

  <div class="page-header">
    <p class="page-eyebrow">Panel Administrativo</p>
    <h1 class="page-title">Briefs <em>recibidos</em></h1>
  </div>

  <div class="users-grid" id="usersGrid"></div>

  <div class="brief-viewer" id="briefViewer">
    <div class="brief-viewer-header">
      <h2 class="brief-viewer-title" id="viewerTitle">Brief</h2>
      <div class="brief-viewer-actions">
        <button class="btn-copy" onclick="copyBrief()">Copiar texto</button>
        <button class="btn-close" onclick="closeViewer()">Cerrar</button>
      </div>
    </div>
    <div class="brief-content" id="briefContent"></div>
  </div>

</div>

<!-- CONFIRM MODAL -->
<div class="modal-overlay" id="modalOverlay" data-clear-user="">
  <div class="modal" onclick="event.stopPropagation()">
    <h3 class="modal-title">Limpiar brief</h3>
    <p class="modal-desc" id="modalDesc">¿Confirmas que quieres borrar el brief de este usuario? Esta acción no se puede deshacer.</p>
    <div class="modal-actions">
      <button type="button" class="btn-confirm-clear" id="btnConfirmClear">Sí, limpiar</button>
      <button type="button" class="btn-cancel" onclick="closeModal()">Cancelar</button>
    </div>
  </div>
</div>

<script>
const ADMIN_CODE = 'cafeteria';
const USERS = ['cervera', 'herrera', 'patroni'];
const USER_LABELS = { cervera: 'Cervera', herrera: 'Herrera', patroni: 'Patroni' };

let pendingClearUser = null;

function escapeHtml(str) {
  if (str == null) return '';
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ── LOGIN: solo "cafeteria" (case-insensitive) ──
function handleLogin() {
  const val = document.getElementById('loginInput').value.trim().toLowerCase();
  if (val === ADMIN_CODE) {
    document.getElementById('loginScreen').classList.add('hidden');
    document.getElementById('topbar').style.display = 'flex';
    document.getElementById('mainApp').style.display = 'block';
    renderUserCards();
  } else {
    document.getElementById('loginError').textContent = 'Código incorrecto.';
    document.getElementById('loginInput').value = '';
  }
}
document.getElementById('loginInput').addEventListener('keydown', e => { if (e.key === 'Enter') handleLogin(); });

function logout() {
  document.getElementById('loginScreen').classList.remove('hidden');
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('mainApp').style.display = 'none';
  document.getElementById('loginInput').value = '';
  document.getElementById('loginError').textContent = '';
  closeViewer();
}

// ── GET USER DATA ──
function getUserData(user) {
  const report = localStorage.getItem(`hp_brief_${user}_report`);
  const progress = localStorage.getItem(`hp_brief_${user}`);
  let latestFinal = null;
  let latestTime = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith(`hp_brief_${user}_FINAL_`)) {
      const ts = parseInt(key.split('_FINAL_')[1]) || 0;
      if (ts > latestTime) { latestTime = ts; latestFinal = key; }
    }
  }
  let finalState = null;
  if (latestFinal) {
    try { finalState = JSON.parse(localStorage.getItem(latestFinal)).state || null; } catch(e) {}
  }
  return {
    hasSubmission: !!latestFinal,
    hasDraft: !!progress && !latestFinal,
    isEmpty: !progress && !latestFinal,
    report: report || null,
    state: finalState || (progress ? JSON.parse(progress) : null),
    submittedAt: latestTime || null,
  };
}

// ── RENDER CARDS ──
function renderUserCards() {
  const grid = document.getElementById('usersGrid');
  grid.innerHTML = '';
  USERS.forEach(user => {
    const data = getUserData(user);
    const label = USER_LABELS[user];
    let statusClass = 'empty', statusText = 'Sin datos';
    if (data.hasSubmission) { statusClass = 'submitted'; statusText = 'Enviado'; }
    else if (data.hasDraft) { statusClass = 'draft'; statusText = 'Borrador'; }
    let metaText = 'Sin actividad registrada';
    if (data.submittedAt) {
      metaText = 'Enviado el ' + new Date(data.submittedAt).toLocaleDateString('es-PE', { day:'2-digit', month:'long', year:'numeric', hour:'2-digit', minute:'2-digit' });
    } else if (data.hasDraft) {
      metaText = 'Progreso guardado — no enviado aún';
    }
    const card = document.createElement('div');
    card.className = 'user-card';
    card.innerHTML = `
      <div class="user-card-header">
        <span class="user-name">${escapeHtml(label)}</span>
        <span class="user-status ${statusClass}">${escapeHtml(statusText)}</span>
      </div>
      <p class="user-meta">${escapeHtml(metaText)}</p>
      <div class="user-actions">
        <button class="btn-view" ${data.isEmpty ? 'disabled' : ''} onclick="viewBrief('${user}')">Ver brief</button>
        <button class="btn-clear" ${data.isEmpty ? 'disabled' : ''} onclick="confirmClear('${user}')">Limpiar</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── VIEW BRIEF (formulario real en solo lectura, mismo que ve el cliente) ──
function viewBrief(user) {
  const label = USER_LABELS[user];
  document.getElementById('viewerTitle').textContent = 'Brief · ' + label;
  document.getElementById('briefViewer').classList.add('show');
  const content = document.getElementById('briefContent');
  const url = window.location.origin + '/index.html#viewonly/' + user;
  content.innerHTML = '<iframe id="briefIframe" class="brief-iframe" src="' + url + '" title="Brief ' + escapeHtml(label) + '"></iframe>';
  document.getElementById('briefViewer').scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function closeViewer() {
  document.getElementById('briefViewer').classList.remove('show');
  document.getElementById('briefContent').innerHTML = '';
}

// ── RENDER REPORT (fallback for text-only reports) ──
function renderReportHTML(report) {
  return '<div class="report-fallback">' + escapeHtml(report) + '</div>';
}

// ── RENDER STATE (visual brief viewer) ──
function renderStateHTML(state) {
  if (!state || !Object.keys(state).length) return '<p class="empty-state">Borrador vacío — el usuario no ha ingresado datos aún.</p>';

  const rooms = [
    { name: 'Sala – Comedor', priorityKey: 'scale__sala_prioridad',
      chips: [{ key: 'pills__sala-muebles', label: 'Muebles a reutilizar' }],
      decisions: [{ key: 'radio__sala-tv-group', label: 'TV' }, { key: 'radio__sala-veg-group', label: 'Vegetación' }],
      notes: [{ key: 'text__sala_muebles_otros', label: 'Otros muebles' }, { key: 'text__sala_tv_detalle', label: 'Detalle TV' }, { key: 'text__sala_veg_detalle', label: 'Detalle vegetación' }, { key: 'text__sala_notas', label: 'Notas' }],
    },
    { name: 'Cocina', priorityKey: 'scale__cocina_prioridad',
      chips: [{ key: 'pills__cocina-muebles', label: 'Muebles a reutilizar' }, { key: 'pills__cocina-enchapes', label: 'Enchapes' }, { key: 'pills__cocina-artefactos', label: 'Artefactos adicionales' }],
      decisions: [{ key: 'radio__cocina-nivel-group', label: 'Intervención' }],
      notes: [{ key: 'text__cocina_muebles_otros', label: 'Otros muebles' }, { key: 'text__cocina_artefactos_otros', label: 'Otros artefactos' }, { key: 'text__cocina_notas', label: 'Notas' }],
    },
    { name: 'Dormitorio Principal', priorityKey: 'scale__dorm1_prioridad',
      chips: [{ key: 'pills__dorm1-muebles', label: 'Muebles a reutilizar' }, { key: 'pills__wc-el', label: 'Closet de él' }, { key: 'pills__wc-ella', label: 'Closet de ella' }],
      decisions: [{ key: 'radio__dorm1-nivel-group', label: 'Intervención' }, { key: 'radio__dorm1-tv-group', label: 'TV' }],
      notes: [{ key: 'text__dorm1_muebles_otros', label: 'Otros muebles' }, { key: 'text__dorm1_tv_detalle', label: 'Detalle TV' }, { key: 'text__wc_el_otros', label: 'Closet de él — otros' }, { key: 'text__wc_el_notas', label: 'Closet de él — notas' }, { key: 'text__wc_ella_otros', label: 'Closet de ella — otros' }, { key: 'text__wc_ella_notas', label: 'Closet de ella — notas' }, { key: 'text__dorm1_notas', label: 'Notas' }],
    },
    { name: 'Dormitorio Cristóbal', priorityKey: 'scale__cristobal_prioridad',
      chips: [{ key: 'pills__cristobal-muebles', label: 'Muebles a reutilizar' }],
      decisions: [{ key: 'age__cristobal', label: 'Edad' }, { key: 'radio__cristobal-evol-group', label: 'Mob. evolutivo' }],
      notes: [{ key: 'text__cristobal_muebles_otros', label: 'Otros muebles' }, { key: 'text__cristobal_notas', label: 'Notas' }],
    },
    { name: 'Family Room', priorityKey: 'scale__family_prioridad',
      chips: [{ key: 'pills__family-muebles', label: 'Muebles a reutilizar' }, { key: 'pills__family-uso', label: 'Uso principal' }],
      decisions: [{ key: 'radio__family-tv-group', label: 'TV' }],
      notes: [{ key: 'text__family_muebles_otros', label: 'Otros muebles' }, { key: 'text__family_uso_otros', label: 'Otros usos' }, { key: 'text__family_tv_detalle', label: 'Detalle TV' }, { key: 'text__family_notas', label: 'Notas' }],
    },
  ];

  const banos = [
    { name: 'Baño Principal',
      decisions: [{ key: 'radio__bano1-nivel-group', label: 'Intervención' }],
      chips: [{ key: 'pills__bano1-equip', label: 'Equipamiento' }],
      notes: [{ key: 'text__bano1_equip_otros', label: 'Otros' }, { key: 'text__bano1_notas', label: 'Notas' }],
    },
    { name: 'Baño Secundario',
      decisions: [{ key: 'radio__bano2-nivel-group', label: 'Intervención' }],
      chips: [{ key: 'pills__bano2-equip', label: 'Equipamiento' }],
      notes: [{ key: 'text__bano2_equip_otros', label: 'Otros' }, { key: 'text__bano2_notas', label: 'Notas' }],
    },
    { name: 'Baño de Visita',
      decisions: [{ key: 'radio__bano3-nivel-group', label: 'Intervención' }],
      chips: [{ key: 'pills__bano3-equip', label: 'Equipamiento' }],
      notes: [{ key: 'text__bano3_equip_otros', label: 'Otros' }, { key: 'text__bano3_notas', label: 'Notas' }],
    },
  ];

  function renderChips(val) {
    const items = Array.isArray(val) ? val : [val];
    return items.map(v => '<span class="chip">' + escapeHtml(v) + '</span>').join('');
  }

  function renderFields(chips, decisions, notes) {
    let h = '';
    chips.forEach(({ key, label }) => {
      const val = state[key];
      if (!val || (Array.isArray(val) && !val.length)) return;
      h += '<div class="field-group"><p class="field-label">' + escapeHtml(label) + '</p><div class="chip-row">' + renderChips(val) + '</div></div>';
    });
    const dh = decisions.map(({ key, label }) => {
      const val = state[key];
      if (!val) return '';
      return '<span class="decision-badge"><span class="decision-badge-label">' + escapeHtml(label) + ':</span> ' + escapeHtml(val) + '</span>';
    }).filter(Boolean).join('');
    if (dh) h += '<div class="decision-row">' + dh + '</div>';
    notes.forEach(({ key, label }) => {
      const val = state[key];
      if (!val) return;
      h += '<div class="field-group"><div class="note-block"><p class="note-label">' + escapeHtml(label) + '</p>' + escapeHtml(val) + '</div></div>';
    });
    return h;
  }

  let html = '';

  // Priority summary
  const priorities = rooms
    .map(r => ({ name: r.name, val: parseInt(state[r.priorityKey]) || 0 }))
    .filter(p => p.val > 0)
    .sort((a, b) => b.val - a.val);
  if (priorities.length) {
    html += '<div class="priority-summary">';
    priorities.forEach(({ name, val }) => {
      let bars = '';
      for (let i = 1; i <= 5; i++) bars += '<span class="priority-bar-seg' + (i <= val ? ' filled' : '') + '"></span>';
      html += '<div class="priority-card"><span class="priority-card-name">' + escapeHtml(name) + '</span><div class="priority-bar">' + bars + '</div></div>';
    });
    html += '</div>';
  }

  // Room cards
  rooms.forEach(room => {
    const priority = state[room.priorityKey];
    const body = renderFields(room.chips, room.decisions, room.notes);
    if (!body && !priority) return;
    html += '<div class="room-card"><div class="room-card-header"><span class="room-card-name">' + escapeHtml(room.name) + '</span>';
    if (priority) html += '<span class="priority-badge">' + escapeHtml(priority) + '</span>';
    html += '</div><div class="room-card-body">' + (body || '<p class="empty-state">Sin datos aún</p>') + '</div></div>';
  });

  // Baños card
  const hasBano = banos.some(b => b.decisions.some(d => state[d.key]) || b.chips.some(c => state[c.key]) || b.notes.some(n => state[n.key]));
  if (hasBano) {
    html += '<div class="room-card"><div class="room-card-header"><span class="room-card-name">Baños</span></div><div class="room-card-body">';
    let first = true;
    banos.forEach(bano => {
      const body = renderFields(bano.chips, bano.decisions, bano.notes);
      if (!body) return;
      html += '<div class="' + (first ? 'field-group' : 'sub-section') + '"><p class="sub-section-name">' + escapeHtml(bano.name) + '</p>' + body + '</div>';
      first = false;
    });
    html += '</div></div>';
  }

  // Generales
  const mh = state['pills__musthaves-list'];
  const mhOtros = state['text__musthaves_otros'];
  const puertas = state['radio__puertas-grupo'];
  const puertasDet = state['text__puertas_detalle'];
  const notasFin = state['text__notas_finales'];

  if (mh || mhOtros || puertas || puertasDet || notasFin) {
    html += '<div class="room-card"><div class="room-card-header"><span class="room-card-name">Generales</span></div><div class="room-card-body">';
    if (mh) html += '<div class="field-group"><p class="field-label">Must-Haves</p><div class="chip-row">' + renderChips(mh) + '</div></div>';
    if (mhOtros) html += '<div class="field-group"><div class="note-block"><p class="note-label">Must-Haves — otros</p>' + escapeHtml(mhOtros) + '</div></div>';
    if (puertas) html += '<div class="decision-row"><span class="decision-badge"><span class="decision-badge-label">Puertas interiores:</span> ' + escapeHtml(puertas) + '</span></div>';
    if (puertasDet) html += '<div class="field-group"><div class="note-block"><p class="note-label">Puertas — detalle</p>' + escapeHtml(puertasDet) + '</div></div>';
    if (notasFin) html += '<div class="field-group"><div class="note-block"><p class="note-label">Notas finales</p>' + escapeHtml(notasFin) + '</div></div>';
    html += '</div></div>';
  }

  return html || '<p class="empty-state">Sin respuestas registradas.</p>';
}

// ── COPY (desde iframe si está el formulario en solo lectura) ──
function copyBrief() {
  const ifr = document.getElementById('briefIframe');
  let text = '';
  if (ifr && ifr.contentDocument && ifr.contentDocument.body) {
    text = ifr.contentDocument.body.innerText;
  } else {
    text = document.getElementById('briefContent').innerText;
  }
  if (!text.trim()) text = 'El brief aún no ha cargado. Espere un momento y vuelva a intentar.';
  navigator.clipboard.writeText(text).then(() => {
    const btn = document.querySelector('.btn-copy');
    if (btn) { btn.textContent = 'Copiado ✓'; setTimeout(() => { btn.textContent = 'Copiar texto'; }, 2000); }
  });
}

// ── CLEAR ──
function confirmClear(user) {
  const overlay = document.getElementById('modalOverlay');
  overlay.dataset.clearUser = user;
  pendingClearUser = user;
  document.getElementById('modalDesc').textContent =
    '¿Confirmas que quieres borrar todos los datos del brief de ' + USER_LABELS[user] + '? Esta acción no se puede deshacer.';
  overlay.classList.add('show');
  document.getElementById('btnConfirmClear').onclick = function() { executeClear(); };
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('show');
  document.getElementById('modalOverlay').removeAttribute('data-clear-user');
  pendingClearUser = null;
}

function executeClear() {
  const overlay = document.getElementById('modalOverlay');
  const user = overlay.dataset.clearUser || pendingClearUser;
  if (!user) return;
  // Borrar todas las claves de este usuario
  localStorage.removeItem('hp_brief_' + user);
  localStorage.removeItem('hp_brief_' + user + '_report');
  const keysToRemove = [];
  for (let i = localStorage.length - 1; i >= 0; i--) {
    const key = localStorage.key(i);
    if (key && (key === 'hp_brief_' + user || key === 'hp_brief_' + user + '_report' || key.indexOf('hp_brief_' + user + '_FINAL_') === 0)) {
      keysToRemove.push(key);
    }
  }
  keysToRemove.forEach(function(k) { localStorage.removeItem(k); });
  closeModal();
  closeViewer();
  renderUserCards();
}

document.getElementById('modalOverlay').addEventListener('click', e => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});
</script>
